<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire — Ethan Spencer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="icon" href="empire-icon.png">
<link rel="apple-touch-icon" href="empire-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Empire">
<style>
/* ─── Tokens ────────────────────────────────────────────────────────────────── */
:root {
  --bg:            oklch(97% 0.010 70);
  --bg-raised:     oklch(98.5% 0.008 70);
  --bg-card:       oklch(99.5% 0.005 70);
  --bg-card-hover: oklch(98% 0.008 70);
  --bg-detail:     oklch(96.5% 0.010 68);
  --bg-chip:       oklch(95.5% 0.012 68);

  --border:        oklch(82% 0.012 65 / 0.70);
  --border-subtle: oklch(86% 0.010 65 / 0.55);
  --border-focus:  oklch(65% 0.030 65 / 0.55);

  --text-primary:   oklch(22% 0.012 60);
  --text-secondary: oklch(38% 0.014 62);
  --text-muted:     oklch(52% 0.012 62);
  --text-faint:     oklch(62% 0.010 62);

  --accent:        oklch(62% 0.145 72);
  --accent-dim:    oklch(62% 0.145 72 / 0.10);
  --accent-border: oklch(62% 0.145 72 / 0.30);

  --green:         oklch(52% 0.14 145);
  --green-bg:      oklch(52% 0.14 145 / 0.10);
  --blue:          oklch(52% 0.14 240);
  --blue-bg:       oklch(52% 0.14 240 / 0.10);
  --red:           oklch(50% 0.18 25);
  --red-bg:        oklch(50% 0.18 25 / 0.10);
  --orange:        oklch(52% 0.14 72);
  --orange-bg:     oklch(52% 0.14 72 / 0.10);

  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: "DM Sans", system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── Header ─────────────────────────────────────────────────────────────────── */
header {
  padding: 36px 36px 0;
  max-width: 1200px;
  margin: 0 auto;
}

.header-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  opacity: 0.85;
}

.header-title-row {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}

h1 {
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 28px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  line-height: 1;
}

.header-date {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
  margin-bottom: 0;
}

.nav-link {
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--border-subtle);
  font-weight: 500;
  transition: border-color 0.15s, color 0.15s;
}

.nav-link:hover {
  border-color: var(--border-focus);
  color: var(--text-secondary);
}

.nav-link.active {
  background: var(--accent-dim);
  border-color: var(--accent-border);
  color: var(--accent);
}

/* ─── Main ───────────────────────────────────────────────────────────────────── */
main {
  padding: 24px 36px 56px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ─── Summary Strip ──────────────────────────────────────────────────────────── */
.summary-strip {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.stat-cell {
  flex: 1;
  padding: 14px 20px;
  border-right: 1px solid var(--border-subtle);
  min-width: 0;
}

.stat-cell:last-child { border-right: none; }

.stat-value {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 10.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 500;
}

/* ─── Section Heading ────────────────────────────────────────────────────────── */
.section-heading {
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--text-faint);
  margin-bottom: 10px;
  margin-top: 28px;
}

.section-heading:first-child {
  margin-top: 0;
}

/* ─── Grid layout ────────────────────────────────────────────────────────────── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

.full-width {
  grid-column: 1 / -1;
}

/* ─── Card base ──────────────────────────────────────────────────────────────── */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px oklch(40% 0.012 60 / 0.06);
}

.panel-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}

.panel-count {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 400;
}

.panel-body {
  padding: 14px 18px;
}

/* ─── Task rows ──────────────────────────────────────────────────────────────── */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--bg);
  border: 1px solid var(--border-subtle);
  border-radius: 7px;
  transition: border-color 0.15s;
}

.task-item:hover {
  border-color: var(--border-focus);
}

.task-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-dot.priority-high    { background: var(--red); }
.task-dot.priority-medium  { background: var(--orange); }
.task-dot.priority-low     { background: var(--text-faint); }
.task-dot.priority-ASAP    { background: var(--red); }
.task-dot.priority-default { background: var(--text-faint); }

.task-text {
  flex: 1;
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.3;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.task-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}

.tag-home     { background: var(--blue-bg);   color: var(--blue); }
.tag-school   { background: var(--green-bg);  color: var(--green); }
.tag-business { background: var(--orange-bg); color: var(--orange); }
.tag-church   { background: oklch(55% 0.14 310 / 0.12); color: oklch(45% 0.14 310); }
.tag-health   { background: var(--green-bg);  color: var(--green); }
.tag-personal { background: var(--bg-chip);   color: var(--text-muted); }
.tag-default  { background: var(--bg-chip);   color: var(--text-muted); }

.task-due {
  font-size: 10.5px;
  color: var(--text-faint);
  white-space: nowrap;
}

.task-due.overdue   { color: var(--red);    font-weight: 600; }
.task-due.due-soon  { color: var(--orange); font-weight: 500; }

/* ─── Ventures quick-view ────────────────────────────────────────────────────── */
.venture-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.venture-item {
  padding: 11px 14px;
  background: var(--bg);
  border: 1px solid var(--border-subtle);
  border-radius: 7px;
  transition: border-color 0.15s;
}

.venture-item:hover {
  border-color: var(--border-focus);
}

.venture-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.venture-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
}

.stage-badge {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
}

.stage-launched   { background: oklch(46% 0.15 145 / 0.12); color: oklch(40% 0.15 145); }
.stage-pre-launch { background: oklch(46% 0.14 240 / 0.12); color: oklch(40% 0.14 240); }
.stage-research   { background: oklch(52% 0.14 72 / 0.12);  color: oklch(44% 0.14 72); }
.stage-idea       { background: oklch(48% 0.010 60 / 0.12); color: oklch(40% 0.010 60); }
.stage-paused     { background: oklch(52% 0.13 42 / 0.12);  color: oklch(44% 0.13 42); }
.stage-shelved    { background: oklch(48% 0.14 20 / 0.12);  color: oklch(40% 0.14 20); }

.priority-mark {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

.priority-mark.high   { background: var(--red-bg);    color: var(--red); }
.priority-mark.medium { background: var(--orange-bg); color: var(--orange); }
.priority-mark.low    { background: var(--bg-chip);   color: var(--text-faint); }

.venture-next {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.venture-arrow {
  color: var(--accent);
  flex-shrink: 0;
  font-size: 11px;
  margin-top: 1px;
  opacity: 0.75;
}

/* ─── Link to portfolio ──────────────────────────────────────────────────────── */
.portfolio-link-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: 10px;
  margin-bottom: 28px;
}

.portfolio-link-text {
  font-size: 13px;
  color: var(--text-primary);
  font-weight: 500;
}

.portfolio-link-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

.portfolio-link-btn {
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  padding: 5px 14px;
  background: var(--bg-card);
  border: 1px solid var(--accent-border);
  border-radius: 5px;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.15s;
}

.portfolio-link-btn:hover {
  background: oklch(99% 0.008 70);
}

/* ─── Empty state ────────────────────────────────────────────────────────────── */
.empty-state {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  padding: 24px 0;
}

/* ─── Responsive ─────────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  header { padding: 24px 20px 0; }
  main   { padding: 20px 20px 48px; }
  .dashboard-grid { grid-template-columns: 1fr; }
  .full-width { grid-column: 1; }
  h1 { font-size: 23px; }
  .summary-strip { overflow-x: auto; }
  .stat-cell { min-width: 90px; }
}

@media (max-width: 600px) {
  header { padding: 20px 16px 0; }
  main   { padding: 16px 16px 40px; }
  h1 { font-size: 20px; }
  .portfolio-link-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
}
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Empire</div>
  <div class="header-title-row">
    <h1>Ethan Spencer</h1>
    <span class="header-date" id="header-date"></span>
  </div>
  <div class="header-nav">
    <a class="nav-link active" href="personal.html">Empire</a>
    <a class="nav-link" href="index.html">Business Portfolio</a>
  </div>
</header>

<main>

  <!-- Summary strip -->
  <div class="summary-strip" id="summary-strip" style="margin-top:24px">
    <!-- populated by JS -->
  </div>

  <!-- Link to business portfolio -->
  <div class="portfolio-link-bar">
    <div>
      <div class="portfolio-link-text">Spencer Ventures Business Portfolio</div>
      <div class="portfolio-link-sub">Active ventures — pre-launch, research, and concept stages</div>
    </div>
    <a class="portfolio-link-btn" href="index.html">Open Dashboard →</a>
  </div>

  <div class="dashboard-grid">

    <!-- Tasks panel -->
    <div class="panel full-width">
      <div class="panel-header">
        <span class="panel-title">High-Priority Tasks</span>
        <span class="panel-count" id="task-count"></span>
      </div>
      <div class="panel-body">
        <div class="task-list" id="task-list">
          <!-- populated by JS -->
        </div>
      </div>
    </div>

    <!-- Top ventures -->
    <div class="panel full-width">
      <div class="panel-header">
        <span class="panel-title">High Priority Ventures</span>
        <span class="panel-count">2 active</span>
      </div>
      <div class="panel-body">
        <div class="venture-list" id="top-ventures">
          <!-- populated by JS -->
        </div>
      </div>
    </div>

  </div>
</main>

<script>
// ─── TASKS DATA (business tasks only) ────────────────────────────────────────
const TASKS = [
  {
    title: "File Provisional Patent",
    due: "2026-05-15",
    priority: "high",
    tags: ["business"],
    project: "Smart Home Tech"
  },
  {
    title: "Research Patent Agent Marketplaces",
    due: null,
    priority: "medium",
    tags: ["business"],
    project: "Patent Launch"
  },
  {
    title: "Build and Deploy Patent Launch Landing Page",
    due: null,
    priority: "high",
    tags: ["business"],
    project: "Patent Launch"
  },
  {
    title: "Find Patent Agent / Attorney Contractor",
    due: null,
    priority: "high",
    tags: ["business"],
    project: "Patent Launch"
  },
  {
    title: "Set Up Professional Email (Google Workspace)",
    due: null,
    priority: "medium",
    tags: ["business"],
    project: "Patent Launch"
  },
  {
    title: "Open Business Bank Account",
    due: null,
    priority: "medium",
    tags: ["business"],
    project: "Patent Launch"
  },
  {
    title: "Set Up Stripe for Payments",
    due: null,
    priority: "medium",
    tags: ["business"],
    project: "Patent Launch"
  },
  {
    title: "Order Dev Hardware: BioAmp EXG Pill x4 + ESP32-S3 + BMI270",
    due: null,
    priority: "medium",
    tags: ["business"],
    project: "Smart Strap"
  },
  {
    title: "Join Makerspace (Nova Labs or HacDC)",
    due: null,
    priority: "low",
    tags: ["business"],
    project: "Smart Strap"
  },
  {
    title: "BitterLitter: Run Treat Dip Test When Quassia Arrives",
    due: null,
    priority: "high",
    tags: ["business"],
    project: "BitterLitter"
  }
];

// ─── HIGH PRIORITY VENTURES ──────────────────────────────────────────────────
const TOP_VENTURES = [
  {
    name: "Patent Launch",
    stage: "pre-launch",
    priority: "high",
    next: "Build and deploy landing page and marketing site"
  },
  {
    name: "BitterLitter",
    stage: "research",
    priority: "high",
    next: "Run treat dip test when quassia arrives (0.01%, 0.05%, 0.1%)"
  }
];

// ─── UTILS ────────────────────────────────────────────────────────────────────
const TODAY = new Date();

function parseDue(str) {
  if (!str) return null;
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dueDiff(str) {
  if (!str) return null;
  const due = parseDue(str);
  const today = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
  return Math.ceil((due - today) / 86400000);
}

function formatDue(str) {
  if (!str) return '';
  const diff = dueDiff(str);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff < 0) return Math.abs(diff) + 'd overdue';
  return parseDue(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function dueClass(str) {
  if (!str) return '';
  const diff = dueDiff(str);
  if (diff < 0) return 'overdue';
  if (diff <= 3) return 'due-soon';
  return '';
}

function priorityOrder(p) {
  return { ASAP: 0, high: 1, medium: 2, low: 3 }[p] ?? 4;
}

// ─── SUMMARY STRIP ───────────────────────────────────────────────────────────
function renderSummary() {
  const overdue  = TASKS.filter(t => t.due && dueDiff(t.due) < 0).length;
  const due_soon = TASKS.filter(t => t.due && dueDiff(t.due) >= 0 && dueDiff(t.due) <= 7).length;
  const high     = TASKS.filter(t => t.priority === 'high' || t.priority === 'ASAP').length;

  document.getElementById('summary-strip').innerHTML = `
    <div class="stat-cell">
      <div class="stat-value">${TASKS.length}</div>
      <div class="stat-label">Business Tasks</div>
    </div>
    <div class="stat-cell">
      <div class="stat-value" style="color:var(--red)">${overdue}</div>
      <div class="stat-label">Overdue</div>
    </div>
    <div class="stat-cell">
      <div class="stat-value" style="color:var(--orange)">${due_soon}</div>
      <div class="stat-label">Due This Week</div>
    </div>
    <div class="stat-cell">
      <div class="stat-value" style="color:var(--red)">${high}</div>
      <div class="stat-label">High Priority</div>
    </div>
    <div class="stat-cell">
      <div class="stat-value">4</div>
      <div class="stat-label">Active Ventures</div>
    </div>
  `;
}

// ─── TASK LIST ────────────────────────────────────────────────────────────────
function renderTasks() {
  const sorted = [...TASKS].sort((a, b) => {
    const pd = priorityOrder(a.priority) - priorityOrder(b.priority);
    if (pd !== 0) return pd;
    const da = a.due ? dueDiff(a.due) : 9999;
    const db = b.due ? dueDiff(b.due) : 9999;
    return da - db;
  });

  document.getElementById('task-count').textContent = sorted.length + ' tasks';

  if (sorted.length === 0) {
    document.getElementById('task-list').innerHTML = '<div class="empty-state">All clear. No pending tasks.</div>';
    return;
  }

  document.getElementById('task-list').innerHTML = sorted.map(t => {
    const tagHTML = t.tags.slice(0, 2).map(tag => {
      const cls = ['home','school','business','church','health','personal'].includes(tag) ? 'tag-' + tag : 'tag-default';
      return `<span class="task-tag ${cls}">${tag}</span>`;
    }).join('');
    const dueLabel = formatDue(t.due);
    const dueCls   = dueClass(t.due);
    const dotCls   = ['ASAP','high','medium','low'].includes(t.priority) ? 'priority-' + t.priority : 'priority-default';
    return `
      <div class="task-item">
        <span class="task-dot ${dotCls}"></span>
        <span class="task-text">${t.title}${t.project ? ' <span style="font-size:11px;color:var(--text-faint);">· ' + t.project + '</span>' : ''}</span>
        <div class="task-meta">
          ${tagHTML}
          ${dueLabel ? `<span class="task-due ${dueCls}">${dueLabel}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ─── TOP VENTURES ────────────────────────────────────────────────────────────
function renderVentures() {
  document.getElementById('top-ventures').innerHTML = TOP_VENTURES.map(v => `
    <div class="venture-item">
      <div class="venture-top">
        <span class="priority-mark ${v.priority}">${v.priority === 'high' ? 'High' : v.priority}</span>
        <span class="venture-name">${v.name}</span>
        <span class="stage-badge stage-${v.stage}">${v.stage.replace('-', '\u2011')}</span>
      </div>
      <div class="venture-next">
        <span class="venture-arrow">→</span>
        <span>${v.next}</span>
      </div>
    </div>
  `).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('header-date').textContent = TODAY.toLocaleDateString('en-US', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

renderSummary();
renderTasks();
renderVentures();
</script>
</body>
</html>
